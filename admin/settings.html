<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../photos/logo.png?v=20260522" type="image/png" />
  <title>Settings — Admin Panel — AI Solutions</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-code@4.2.1/index.css" rel="stylesheet" />
  <link href="../css/theme.css?v=20260522" rel="stylesheet" />

  <style>
    body, * { font-family: 'Cascadia Code' !important; }
    body { background: whitesmoke; margin: 0; padding: 0; }
    .admin-sidebar { background: white; height: 100vh; box-shadow: 2px 0 12px rgba(0,0,0,.08); position: fixed; left: 0; top: 0; width: 250px; overflow-y: auto; padding: 1.5rem 0; }
    .admin-header { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid lightgray; margin-bottom: 1.5rem; }
    .admin-logo { display: flex; align-items: center; gap: .6rem; text-decoration: none; margin-bottom: 1rem; }
    .admin-logo img { width: 40px; height: 40px; }
    .admin-logo-text { font-weight: 700; color: darkslategray; font-size: 1.1rem; }
    .admin-logo-text strong { color: blue; }
    .admin-badges { display: flex; align-items: center; gap: .5rem; }
    .admin-badge { display: inline-block; background: crimson; color: white; padding: .3rem .8rem; border-radius: 6px; font-size: .75rem; font-weight: 600; }
    .logout-sidebar-btn { background: crimson; color: white; border: none; padding: .3rem .8rem; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background .2s; font-size: .75rem; white-space: nowrap; display: inline-block; }
    .logout-sidebar-btn:hover { background: firebrick; color: white; text-decoration: none; }
    .admin-menu { list-style: none; padding: 0 1rem; margin: 0; }
    .admin-menu li { margin-bottom: 0.5rem; }
    .admin-menu a { display: flex; align-items: center; gap: .8rem; padding: .75rem 1rem; border-radius: 8px; color: slategray; text-decoration: none; transition: all .2s; font-weight: 500; }
    .admin-menu a:hover, .admin-menu a.active { background: rgba(79,70,229,.1); color: blue; }
    .admin-menu i { width: 20px; text-align: center; }
    .admin-main { margin-left: 250px; padding: 2rem; }
    .admin-topbar { background: white; padding: 1rem 2rem; border-radius: 12px; display: flex; justify-content: flex-start; align-items: center; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .admin-topbar h1 { margin: 0; font-size: 1.8rem; color: darkslategray; font-weight: 700; }
    .logout-btn { background: crimson; color: white; border: none; padding: .6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background .2s; }
    .logout-btn:hover { background: firebrick; color: white; text-decoration: none; }
    .del-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 9999; align-items: center; justify-content: center; }
    .del-modal.show { display: flex; }
    .del-modal-content { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 420px; text-align: center; }
    .del-modal-content h5 { margin-bottom: 1rem; font-weight: 700; }
    .del-modal-content p { color: slategray; margin-bottom: 1.5rem; font-size: .95rem; }
    .del-modal-buttons { display: flex; gap: 1rem; justify-content: center; }
  </style>
  <script src="../js/api-config.js"></script>
</head>
<body>

  <aside class="admin-sidebar">
    <div class="admin-header">
      <a href="../index.html" class="admin-logo">
        <img src="../photos/logo.png?v=20260522" alt="AI">
        <div class="admin-logo-text brand-word"><strong>Solutions</strong></div>
      </a>
      <div class="admin-badges">
        <span class="admin-badge"><i class="bi bi-shield-check"></i> Admin</span>
        <button class="logout-sidebar-btn" onclick="logout()" title="Logout">Logout</button>
      </div>
    </div>

    <ul class="admin-menu">
      <li><a href="dashboard.html" class="admin-link"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a></li>
      <li><a href="analytics.html" class="admin-link"><i class="bi bi-graph-up"></i> <span>Analytics</span></a></li>
      <li><a href="inquiries.html" class="admin-link"><i class="bi bi-chat-dots"></i> <span>Customer Inquiries</span></a></li>
      <li><a href="feedback.html" class="admin-link"><i class="bi bi-megaphone"></i> <span>Feedback</span></a></li>

      <li><a href="demos.html" class="admin-link"><i class="bi bi-calendar-check"></i> <span>Demo Requests</span></a></li>
      <li><a href="registrations.html" class="admin-link"><i class="bi bi-clipboard-check"></i> <span>Event Registrations</span></a></li>
      <li><a href="events.html" class="admin-link"><i class="bi bi-calendar-event"></i> <span>Events</span></a></li>
      <li><a href="settings.html" class="admin-link active"><i class="bi bi-gear"></i> <span>Settings</span></a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Settings</h1>
    </div>

    <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06);">
      <h5 style="margin-bottom: 2rem; color: darkslategray; font-weight: 600; font-size: 1.2rem;">Admin Settings</h5>
      
      <!-- Site Configuration Section -->
      <div style="margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 2px solid whitesmoke;">
        <h6 style="margin-bottom: 1.5rem; color: royalblue; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em;">
          <i class="bi bi-gear me-2"></i>Site Configuration
        </h6>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
          <div>
            <label style="display: block; margin-bottom: .75rem; font-weight: 600; color: darkslategray; font-size: .95rem;">Site Name</label>
            <input type="text" id="siteName" value="AI Solutions" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem; transition: border-color 0.2s;" onmouseover="this.style.borderColor='royalblue'" onmouseout="this.style.borderColor='lightgray'" />
          </div>
          <div>
            <label style="display: block; margin-bottom: .75rem; font-weight: 600; color: darkslategray; font-size: .95rem;">Admin Email</label>
            <input type="email" id="adminEmail" value="support@aisolutions.com" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem; transition: border-color 0.2s;" onmouseover="this.style.borderColor='royalblue'" onmouseout="this.style.borderColor='lightgray'" />
          </div>
        </div>
        <button style="background: royalblue; color: white; border: none; padding: .75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 1rem; transition: background 0.2s;" onmouseover="this.style.background='darkblue'" onmouseout="this.style.background='royalblue'" onclick="saveSiteSettings()">
          <i class="bi bi-check-circle me-2"></i>Save Site Settings
        </button>
      </div>

      <!-- Username Section -->
      <div style="margin-bottom: 2rem;">
        <h6 style="margin-bottom: 1.5rem; color: royalblue; font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em;">
          <i class="bi bi-shield-lock me-2"></i>Change Admin Credentials
        </h6>

        <button style="background: blue; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: background 0.2s;" onmouseover="this.style.background='darkblue'" onmouseout="this.style.background='blue'" onclick="showVerifyStep()">
          <i class="bi bi-pencil-square me-2"></i>Change Username/Password
        </button>
      </div>
    </div>
  </main>

  <!-- Logout Modal -->
  <div id="logoutModal" class="del-modal">
    <div class="del-modal-content">
      <h5 style="color: crimson;"><i class="bi bi-box-arrow-right"></i> Logout</h5>
      <p>Are you sure you want to logout?</p>
      <div class="del-modal-buttons">
        <button type="button" class="action-btn" onclick="closeModal('logoutModal')" style="background: slategray;">Cancel</button>
        <button type="button" class="action-btn" onclick="confirmLogout()" style="background: crimson;">Logout</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('/api/auth/me/')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) { window.location.href = 'index.html'; return; }
      })
      .catch(function() { window.location.href = 'index.html'; });
    });

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function logout() {
      document.getElementById('logoutModal').classList.add('show');
    }

    function confirmLogout() {
      closeModal('logoutModal');
      fetch('/api/auth/logout/', { method: 'POST' })
      .then(function() { window.location.href = 'index.html'; })
      .catch(function() { window.location.href = 'index.html'; });
    }

    function saveSiteSettings() {
      showMessage('Site settings saved successfully!', 'success');
    }

    function showVerifyStep() {
      const verifyHtml = `
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
          <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); width: 90%; max-width: 500px;">
            <h3 style="margin-bottom: 1.5rem; color: darkslategray; font-weight: 700;">Verify Your Identity</h3>
            <p style="color: slategray; margin-bottom: 1.5rem; font-size: 0.95rem;">Enter your current username and password to proceed.</p>
            
            <div style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: .5rem; font-weight: 600; color: darkslategray; font-size: .9rem;">Current Username</label>
              <input type="text" id="verifyUsername" placeholder="Enter your current username" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem;" />
            </div>
            
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: .5rem; font-weight: 600; color: darkslategray; font-size: .9rem;">Current Password</label>
              <input type="password" id="verifyPassword" placeholder="Enter your current password" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem;" />
            </div>
            
            <div style="display: flex; gap: 1rem;">
              <button style="flex: 1; background: royalblue; color: white; border: none; padding: .75rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;" onclick="verifyCredentials()">Continue</button>
              <button style="flex: 1; background: lightgray; color: darkslategray; border: none; padding: .75rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;" onclick="closeModal()">Cancel</button>
            </div>
          </div>
        </div>
      `;
      
      document.body.insertAdjacentHTML('beforeend', verifyHtml);
    }

    var CURRENT_PASSWORD = '';

    function verifyCredentials() {
      const username = document.getElementById('verifyUsername').value.trim();
      const password = document.getElementById('verifyPassword').value;

      if (!username || !password) {
        showMessage('Please enter both username and password', 'danger');
        return;
      }

      CURRENT_PASSWORD = password;

      // Verify current password via API
      fetch('/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          closeModal();
          showChangeStep({ username: username, password: password });
        } else {
          showMessage('Current username or password is incorrect', 'danger');
        }
      })
      .catch(function() {
        showMessage('Server error. Please try again.', 'danger');
      });
    }

    function showChangeStep(currentCredentials) {
      const changeHtml = `
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
          <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); width: 90%; max-width: 500px;">
            <h3 style="margin-bottom: 1.5rem; color: darkslategray; font-weight: 700;">Change Username/Password</h3>
            
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: .5rem; font-weight: 600; color: darkslategray; font-size: .9rem;">Your Username</label>
              <input type="text" id="newUsernameInput" value="${currentCredentials.username}" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem;" />
            </div>
            
            <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid lightgray;">
            
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: .5rem; font-weight: 600; color: darkslategray; font-size: .9rem;">Your Password</label>
              <input type="text" id="newPasswordInput" value="${currentCredentials.password}" style="width: 100%; padding: .75rem; border: 1px solid lightgray; border-radius: 8px; font-size: .9rem;" />
            </div>
            
            <div style="display: flex; gap: 1rem;">
              <button style="flex: 1; background: mediumseagreen; color: white; border: none; padding: .75rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;" onclick="saveCredentials()">Save Changes</button>
              <button style="flex: 1; background: lightgray; color: darkslategray; border: none; padding: .75rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;" onclick="closeModal()">Cancel</button>
            </div>
          </div>
        </div>
      `;
      
      document.body.insertAdjacentHTML('beforeend', changeHtml);
    }

    function saveCredentials() {
      var newUsername = document.getElementById('newUsernameInput').value.trim();
      var newPassword = document.getElementById('newPasswordInput').value.trim();

      if (!newUsername || !newPassword) {
        showMessage('Please enter both username and password', 'danger');
        return;
      }

      if (newPassword.length < 4) {
        showMessage('Password must be at least 4 characters long', 'danger');
        return;
      }

      fetch('/api/auth/change-password/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          current_password: CURRENT_PASSWORD,
          new_username: newUsername,
          new_password: newPassword
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showMessage('Credentials updated successfully! Please login again.', 'success');
          window.location.href = 'index.html';
        } else {
          showMessage(data.error || 'Failed to update credentials', 'danger');
        }
      })
      .catch(function() {
        showMessage('Server error. Please try again.', 'danger');
      });
    }

    function closeModal() {
      const modal = document.querySelector('div[style*="position: fixed"]');
      if (modal) {
        modal.remove();
      }
    }
  </script>
</body>
</html>
