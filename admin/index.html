<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../photos/logo.png?v=20260522" type="image/png" />
  <title>Admin Login — AI Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { 
      font-family: 'Cascadia Code';
      min-height: 100vh;
      background: linear-gradient(135deg, aliceblue 0%, lightblue 50%, lightblue 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card { 
      background: white; 
      border-radius: 20px; 
      box-shadow: 0 20px 60px lightgray; 
      width: 100%; 
      max-width: 450px; 
      padding: 2.5rem;
    }
    .admin-badge {
      display: inline-block;
      background: crimson;
      color: white;
      padding: .3rem .8rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    h2 { 
      font-size: 1.6rem; 
      font-weight: 800; 
      color: darkslategray;
      margin-bottom: 0.5rem;
    }
    .form-control { 
      border-radius: 8px; 
      border: 1.5px solid lightgray; 
      padding: 0.65rem 1rem;
    }
    .form-control:focus { 
      border-color: blue; 
      box-shadow: 0 0 0 3px lavender;
    }
    .btn-login { 
      background: blue; 
      border: none; 
      color: white; 
      font-weight: 700; 
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-login:hover { 
      background: darkblue; 
    }
  </style>
  <script src="../js/api-config.js"></script>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-3">
      <span class="admin-badge">Admin Access</span>
    </div>
    <h2 class="text-center">Admin Login</h2>
    <p class="text-muted text-center mb-4" style="font-size: 0.9rem;">Sign in to the administration panel</p>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

  </div>

  <script>
    // If already logged in, redirect to dashboard
    fetch('/api/auth/me/')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        window.location.replace('dashboard.html');
      }
    })
    .catch(function() {});

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alertBox');

      fetch('/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          alertBox.className = 'alert alert-success';
          alertBox.textContent = 'Login successful! Redirecting...';
          setTimeout(function() { window.location.replace('dashboard.html'); }, 1000);
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = data.error || 'Invalid username or password';
        }
      })
      .catch(function() {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = 'Server error. Please try again.';
      });
    }
  </script>
</body>
</html>
